name: Release

on:
  push:
    tags:
      - "v*"
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to sync, for example v0.1.0"
        required: false
        type: string

permissions:
  contents: write
  id-token: write
  packages: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Validate release tag
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          EXPECTED_TAG="v${PACKAGE_VERSION}"
          RELEASE_TAG="${{ inputs.tag || github.event.release.tag_name || github.ref_name }}"
          if [ "${RELEASE_TAG}" != "${EXPECTED_TAG}" ]; then
            echo "Release tag ${RELEASE_TAG} does not match package version ${PACKAGE_VERSION}."
            exit 1
          fi

      - name: Run tests
        run: npm test

      - name: Build package
        run: npm run build

      - name: Skip if version is already on npm
        id: npm_version
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} is already published."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish package
        if: steps.npm_version.outputs.published != 'true'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Check GitHub Packages version
        id: github_package_version
        run: |
          OWNER=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          GITHUB_PACKAGE_NAME="@${OWNER}/${PACKAGE_NAME}"
          echo "GITHUB_PACKAGE_NAME=${GITHUB_PACKAGE_NAME}" >> "$GITHUB_ENV"
          if npm view "${GITHUB_PACKAGE_NAME}@${PACKAGE_VERSION}" version --registry=https://npm.pkg.github.com >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "GITHUB_PACKAGE_STATUS=published" >> "$GITHUB_ENV"
            echo "${GITHUB_PACKAGE_NAME}@${PACKAGE_VERSION} is already published to GitHub Packages."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
            echo "GITHUB_PACKAGE_STATUS=missing" >> "$GITHUB_ENV"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish GitHub Packages mirror
        if: steps.github_package_version.outputs.published != 'true'
        run: node scripts/publish-github-package.mjs
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Mark GitHub Packages mirror as published
        if: steps.github_package_version.outputs.published != 'true'
        run: echo "GITHUB_PACKAGE_STATUS=published" >> "$GITHUB_ENV"

      - name: Sync GitHub Release with npm
        run: node scripts/sync-release.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.tag || github.event.release.tag_name || github.ref_name }}
